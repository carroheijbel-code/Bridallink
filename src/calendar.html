<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Calendar - BridalLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-rose-50">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function EventCalendar() {
            const [events, setEvents] = useState([]);
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [showAddForm, setShowAddForm] = useState(false);
            const [newEvent, setNewEvent] = useState({
                title: '',
                time: '',
                type: 'meeting',
                description: ''
            });

            // Get current month and year
            const currentMonth = selectedDate.getMonth();
            const currentYear = selectedDate.getFullYear();

            // Get first day of month and number of days
            const firstDayOfMonth = new Date(currentYear, currentMonth, 1);
            const lastDayOfMonth = new Date(currentYear, currentMonth + 1, 0);
            const startingDayOfWeek = firstDayOfMonth.getDay();
            const daysInMonth = lastDayOfMonth.getDate();

            const monthNames = [
                "January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"
            ];

            const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

            // Generate calendar days
            const calendarDays = [];
            
            // Add empty cells for days before the first day of the month
            for (let i = 0; i < startingDayOfWeek; i++) {
                calendarDays.push(null);
            }

            // Add days of the month
            for (let day = 1; day <= daysInMonth; day++) {
                calendarDays.push(day);
            }

            const formatDate = (day) => {
                return `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            };

            const getEventsForDate = (day) => {
                if (!day) return [];
                const dateStr = formatDate(day);
                return events.filter(event => event.date === dateStr);
            };

            const addEvent = () => {
                if (!newEvent.title || !newEvent.time) return;

                const event = {
                    id: Date.now().toString(),
                    title: newEvent.title,
                    date: formatDate(selectedDate.getDate()),
                    time: newEvent.time,
                    type: newEvent.type,
                    description: newEvent.description
                };

                setEvents([...events, event]);
                setNewEvent({ title: '', time: '', type: 'meeting', description: '' });
                setShowAddForm(false);
            };

            const deleteEvent = (id) => {
                setEvents(events.filter(event => event.id !== id));
            };

            const navigateMonth = (direction) => {
                const newDate = new Date(selectedDate);
                if (direction === 'prev') {
                    newDate.setMonth(currentMonth - 1);
                } else {
                    newDate.setMonth(currentMonth + 1);
                }
                setSelectedDate(newDate);
            };

            const isToday = (day) => {
                if (!day) return false;
                const today = new Date();
                return (
                    day === today.getDate() &&
                    currentMonth === today.getMonth() &&
                    currentYear === today.getFullYear()
                );
            };

            const getEventTypeColor = (type) => {
                switch (type) {
                    case 'meeting': return 'bg-blue-500';
                    case 'appointment': return 'bg-green-500';
                    case 'reminder': return 'bg-yellow-500';
                    case 'deadline': return 'bg-red-500';
                    default: return 'bg-gray-500';
                }
            };

            return (
                <div className="max-w-6xl mx-auto space-y-8 p-6">
                    {/* Header */}
                    <div className="text-center space-y-4">
                        <div className="bg-gradient-to-r from-amber-100 to-rose-100 p-4 rounded-full w-16 h-16 mx-auto flex items-center justify-center">
                            <span className="text-2xl">📅</span>
                        </div>
                        <h1 className="text-3xl font-bold text-amber-800" style={{fontFamily: 'serif'}}>Wedding Calendar</h1>
                        <p className="text-amber-700">Keep track of all your important meetings and appointments</p>
                        <a href="/" className="inline-block px-4 py-2 bg-amber-600 text-white rounded-lg hover:bg-amber-700 transition-colors">
                            ← Back to Dashboard
                        </a>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Calendar */}
                        <div className="lg:col-span-2">
                            <div className="bg-white rounded-lg border shadow-sm p-6">
                                {/* Calendar Header */}
                                <div className="flex items-center justify-between mb-6">
                                    <button
                                        onClick={() => navigateMonth('prev')}
                                        className="p-2 hover:bg-gray-100 rounded-lg transition-colors"
                                    >
                                        ←
                                    </button>
                                    <h2 className="text-xl font-bold text-amber-800">
                                        {monthNames[currentMonth]} {currentYear}
                                    </h2>
                                    <button
                                        onClick={() => navigateMonth('next')}
                                        className="p-2 hover:bg-gray-100 rounded-lg transition-colors"
                                    >
                                        →
                                    </button>
                                </div>

                                {/* Day Headers */}
                                <div className="grid grid-cols-7 gap-1 mb-2">
                                    {dayNames.map(day => (
                                        <div key={day} className="p-2 text-center font-semibold text-gray-600 text-sm">
                                            {day}
                                        </div>
                                    ))}
                                </div>

                                {/* Calendar Grid */}
                                <div className="grid grid-cols-7 gap-1">
                                    {calendarDays.map((day, index) => {
                                        const dayEvents = getEventsForDate(day);
                                        return (
                                            <div
                                                key={index}
                                                className={`min-h-[80px] p-1 border rounded-lg cursor-pointer transition-colors ${
                                                    day ? 'hover:bg-gray-50' : ''
                                                } ${
                                                    isToday(day) ? 'bg-amber-100 border-amber-300' : 'bg-white border-gray-200'
                                                }`}
                                                onClick={() => day && setSelectedDate(new Date(currentYear, currentMonth, day))}
                                            >
                                                {day && (
                                                    <>
                                                        <div className={`text-sm font-medium ${isToday(day) ? 'text-amber-800' : 'text-gray-700'}`}>
                                                            {day}
                                                        </div>
                                                        <div className="space-y-1 mt-1">
                                                            {dayEvents.slice(0, 2).map(event => (
                                                                <div
                                                                    key={event.id}
                                                                    className={`text-xs px-1 py-0.5 rounded text-white truncate ${getEventTypeColor(event.type)}`}
                                                                    title={event.title}
                                                                >
                                                                    {event.title}
                                                                </div>
                                                            ))}
                                                            {dayEvents.length > 2 && (
                                                                <div className="text-xs text-gray-500">
                                                                    +{dayEvents.length - 2} more
                                                                </div>
                                                            )}
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* Event Panel */}
                        <div className="space-y-6">
                            {/* Add Event Button */}
                            <div className="bg-white rounded-lg border shadow-sm p-6">
                                <button
                                    onClick={() => setShowAddForm(!showAddForm)}
                                    className="w-full px-4 py-2 bg-amber-600 text-white rounded-lg hover:bg-amber-700 transition-colors"
                                >
                                    Add New Event
                                </button>
                            </div>

                            {/* Add Event Form */}
                            {showAddForm && (
                                <div className="bg-white rounded-lg border shadow-sm p-6">
                                    <h3 className="text-lg font-semibold text-amber-800 mb-4">New Event</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Event Title
                                            </label>
                                            <input
                                                type="text"
                                                value={newEvent.title}
                                                onChange={(e) => setNewEvent({ ...newEvent, title: e.target.value })}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-300"
                                                placeholder="Enter event title..."
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Date
                                            </label>
                                            <div className="px-3 py-2 border border-gray-300 rounded-lg bg-gray-50">
                                                {formatDate(selectedDate.getDate())}
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Time
                                            </label>
                                            <input
                                                type="time"
                                                value={newEvent.time}
                                                onChange={(e) => setNewEvent({ ...newEvent, time: e.target.value })}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-300"
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Event Type
                                            </label>
                                            <select
                                                value={newEvent.type}
                                                onChange={(e) => setNewEvent({ ...newEvent, type: e.target.value })}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-300"
                                            >
                                                <option value="meeting">Meeting</option>
                                                <option value="appointment">Appointment</option>
                                                <option value="reminder">Reminder</option>
                                                <option value="deadline">Deadline</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Description (Optional)
                                            </label>
                                            <textarea
                                                value={newEvent.description}
                                                onChange={(e) => setNewEvent({ ...newEvent, description: e.target.value })}
                                                rows={3}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-300"
                                                placeholder="Add any additional notes..."
                                            />
                                        </div>

                                        <div className="flex gap-2">
                                            <button
                                                onClick={addEvent}
                                                className="flex-1 px-4 py-2 bg-amber-600 text-white rounded-lg hover:bg-amber-700 transition-colors"
                                            >
                                                Save Event
                                            </button>
                                            <button
                                                onClick={() => setShowAddForm(false)}
                                                className="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors"
                                            >
                                                Cancel
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Today's Events */}
                            <div className="bg-white rounded-lg border shadow-sm p-6">
                                <h3 className="text-lg font-semibold text-amber-800 mb-4">
                                    Events for {formatDate(selectedDate.getDate())}
                                </h3>
                                <div className="space-y-3 max-h-64 overflow-y-auto">
                                    {getEventsForDate(selectedDate.getDate()).length > 0 ? (
                                        getEventsForDate(selectedDate.getDate()).map(event => (
                                            <div key={event.id} className="border rounded-lg p-3">
                                                <div className="flex justify-between items-start mb-2">
                                                    <div className="flex items-center gap-2">
                                                        <div className={`w-3 h-3 rounded-full ${getEventTypeColor(event.type)}`}></div>
                                                        <span className="font-medium text-amber-800">{event.title}</span>
                                                    </div>
                                                    <button
                                                        onClick={() => deleteEvent(event.id)}
                                                        className="text-red-600 hover:text-red-800 text-xs px-1"
                                                    >
                                                        ✕
                                                    </button>
                                                </div>
                                                <div className="text-sm text-gray-600">
                                                    {event.time} • {event.type}
                                                </div>
                                                {event.description && (
                                                    <div className="text-sm text-gray-500 mt-1">
                                                        {event.description}
                                                    </div>
                                                )}
                                            </div>
                                        ))
                                    ) : (
                                        <div className="text-center text-gray-500 py-4">
                                            No events scheduled for this date
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Render the calendar
        ReactDOM.render(<EventCalendar />, document.getElementById('root'));
    </script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
